<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | Ultimate VIP Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pink-main: #ff4d94;
            --pink-glow: rgba(255, 77, 148, 0.6);
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        
        /* SCROLL FIX: touch-action auto and overflow-y auto for mobile scrolling */
        body { 
            background: var(--bg-dark); 
            color: white; 
            min-height: 100vh; 
            overflow-x: hidden; 
            overflow-y: auto; 
            touch-action: auto; 
            -webkit-overflow-scrolling: touch;
        }

        /* --- BACKGROUND MESH --- */
        .login-bg-mesh { position: fixed; inset: 0; z-index: -2; background: linear-gradient(45deg, #020617, #1a0821, #020617); background-size: 400% 400%; animation: meshMove 12s ease infinite; }
        @keyframes meshMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* --- MOUSE & TOUCH TRAIL --- */
        .trail-particle { position: fixed; pointer-events: none; z-index: 10001; color: var(--pink-main); filter: drop-shadow(0 0 5px var(--pink-glow)); animation: particleFade 0.8s forwards ease-out; }
        @keyframes particleFade { to { transform: translateY(15px) scale(0); opacity: 0; } }

        /* --- HEADER RAIN --- */
        .header-love-wrap { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; border-radius: 40px; }
        .header-heart { position: absolute; color: var(--pink-main); font-size: 14px; top: -20px; animation: hRain linear forwards; opacity: 0; }
        @keyframes hRain { 
            0% { transform: translateY(0) rotate(0deg); opacity: 0; } 
            20% { opacity: 0.8; } 
            100% { transform: translateY(300px) rotate(360deg); opacity: 0; } 
        }

        /* --- UI ELEMENTS --- */
        .main-header { margin: 20px; padding: 50px 20px; border-radius: 40px; background: linear-gradient(135deg, rgba(255, 77, 148, 0.1), rgba(255, 255, 255, 0.05)); border: 1px solid rgba(255, 120, 180, 0.2); backdrop-filter: blur(20px); text-align: center; position: relative; overflow: hidden; }
        .user-name-glow { font-size: 30px; font-weight: 900; background: linear-gradient(90deg, #fff, var(--pink-main), #fff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        
        .grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px 30px; max-width: 600px; margin: 0 auto; }
        .nav-card { background: var(--glass); border-radius: 30px; padding: 25px 15px; text-align: center; text-decoration: none; color: white; border: 1px solid rgba(255, 255, 255, 0.05); animation: autoBari 4s infinite; transition: 0.3s; position: relative; cursor: pointer; }
        .nav-card:active { transform: scale(0.95); }
        @keyframes autoBari { 0%, 100% { border-color: rgba(255,255,255,0.05); } 50% { border-color: var(--pink-main); } }
        .nav-card i { font-size: 2.2rem; color: var(--pink-main); margin-bottom: 8px; }

        .hd-avatar { object-fit: cover; border-radius: 50%; display: block; image-rendering: -webkit-optimize-contrast; }

        .btn-premium { background: linear-gradient(90deg, var(--pink-main), #cc0052); color: white; border: none; padding: 12px 20px; border-radius: 50px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        .p-input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 50px; outline: none; margin-bottom: 10px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .social-btn { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; color: white; font-size: 18px; }
        
        @keyframes heartBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .result-card { background: #000; border: 2px solid var(--pink-main); padding: 25px; border-radius: 35px; width: 100%; max-width: 350px; text-align: center; position: relative; }
    </style>
</head>

<body>
    <div class="login-bg-mesh"></div>

    <audio id="snd-open" src="open.mp3" preload="auto"></audio>

    <div id="login-screen" class="modal" style="display: flex;">
        <div style="text-align: center; background: var(--glass); padding: 40px; border-radius: 40px; border: 1px solid var(--pink-main);">
            <img src="ratan.jpg" class="hd-avatar" style="width:100px; height:100px; border:3px solid var(--pink-main); margin: 0 auto 15px;">
            <h2>RATAN BRO</h2>
            <p style="color:#555; font-size:12px; margin-bottom:20px;">VIP PORTAL LOGIN</p>
            <button class="btn-premium" onclick="login()">LOGIN WITH GOOGLE</button>
        </div>
    </div>

    <div id="audio-gate-modal" class="modal">
        <div style="text-align: center; background: var(--glass); padding: 30px; border-radius: 40px; border: 1px solid var(--pink-main); max-width: 320px;">
            <i class="fas fa-unlock-alt" style="font-size: 2.5rem; color: var(--pink-main); margin-bottom: 15px;"></i>
            <h3 style="margin-bottom: 10px;">স্বাগতম বস্!</h3>
            <p style="font-size: 14px; color: #ccc; margin-bottom: 25px;">ড্যাশবোর্ড আনলক করতে নিচের বাটনে ক্লিক করুন।</p>
            <button class="btn-premium" onclick="enterDashboard()">ENTER DASHBOARD</button>
        </div>
    </div>

    <div id="dashboard-ui" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
            <div style="display: flex; gap: 10px;">
                <a href="https://www.facebook.com/profile.php?id=61552305287329" class="social-btn" style="background: #1877f2;"><i class="fab fa-facebook-f"></i></a>
                <a href="https://wa.me/8801609160109" class="social-btn" style="background: #25d366;"><i class="fab fa-whatsapp"></i></a>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="color: var(--pink-main); font-weight: 700; font-size: 13px;"><i class="fas fa-eye"></i> <span id="v-count">200</span></div>
                <button onclick="logout()" style="color:#666; background:none; border:1px solid #333; padding:4px 12px; border-radius:50px; font-size:11px;">Sign Out</button>
            </div>
        </div>

        <header class="main-header">
            <div id="header-rain" class="header-love-wrap"></div>
            <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 15px; position: relative; z-index: 5;">
                <img src="ratan.jpg" class="hd-avatar" style="width:100px; height:100px; border:3px solid var(--pink-main);">
                <img id="u-photo" src="" class="hd-avatar" style="width:80px; height:80px; border:3px solid white; margin-left:-25px; z-index:6;">
            </div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px; position: relative; z-index: 5;">
                <i class="fas fa-heart" style="color:var(--pink-main); animation:heartBeat 1.2s infinite;"></i>
                <span id="u-name" class="user-name-glow">...</span>
                <i class="fas fa-heart" style="color:var(--pink-main); animation:heartBeat 1.2s infinite;"></i>
            </div>
            <p id="u-wish" style="margin-top: 10px; font-size: 14px; color: #ccc; position: relative; z-index: 5;">লোড হচ্ছে...</p>
        </header>

        <main class="grid-layout">
            <div class="nav-card" onclick="openNotice()">
                <div id="alert-dot" style="position:absolute; top:12px; right:12px; width:8px; height:8px; background:red; border-radius:50%; display:none; box-shadow: 0 0 10px red;"></div>
                <i class="fas fa-bullhorn"></i><p>নোটিশ বোর্ড</p>
            </div>
            <a href="portfolio.html" class="nav-card"><i class="fas fa-user-tie"></i><p>আমার ডিটেইলস</p></a>
            <a href="business.html" class="nav-card"><i class="fas fa-shopping-bag"></i><p>বিজনেসের খবর</p></a>
            <div class="nav-card" onclick="document.getElementById('p-maker-modal').style.display='flex'"><i class="fas fa-magic"></i><p>পোর্টফোলিও মেকার</p></div>
            <a href="testpaper.html" class="nav-card"><i class="fas fa-graduation-cap"></i><p>নোটস / ফাইল</p></a>
            <a href="number.html" target="_self" class="nav-card"><i class="fas fa-search"></i><p>নম্বর ডিটেইলস</p></a>
        </main>

        <section style="max-width: 500px; margin: 0 auto 50px; padding: 0 20px;">
            <div style="background: rgba(0,0,0,0.5); padding: 20px; border-radius: 30px; border: 1px solid rgba(255,77,148,0.1);">
                <div id="chat-content" style="height: 100px; overflow-y: auto; font-size: 13px; margin-bottom: 10px;"></div>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="ai-msg" placeholder="AI কে কিছু জিজ্ঞেস করো..." style="flex:1; background:#000; border:1px solid #333; color:#fff; padding:10px 15px; border-radius:50px; outline:none; font-size:13px;">
                    <button onclick="askAI()" class="btn-premium" style="width:auto; padding:0 15px;">পাঠাও</button>
                </div>
            </div>
        </section>
    </div>

    <div id="p-maker-modal" class="modal">
        <div style="background: #000; width: 100%; max-width: 380px; padding: 30px; border-radius: 35px; border: 1px solid var(--pink-main); text-align: center;">
            <h3 style="color: var(--pink-main); margin-bottom: 20px;">মেক পোর্টফোলিও</h3>
            <input type="text" id="p-name" placeholder="আপনার পূর্ণ নাম" class="p-input">
            <input type="text" id="p-title" placeholder="টাইটেল" class="p-input">
            <input type="text" id="p-phone" placeholder="ফোন নম্বর" class="p-input">
            <input type="text" id="p-fb" placeholder="ফেসবুক লিঙ্ক" class="p-input">
            <input type="text" id="p-wa" placeholder="হোয়াটসঅ্যাপ" class="p-input">
            <button class="btn-premium" onclick="createPortfolio()">জেনারেট করুন</button>
            <button onclick="document.getElementById('p-maker-modal').style.display='none'" style="margin-top:15px; background:none; border:none; color:#555;">বন্ধ করুন</button>
        </div>
    </div>

    <div id="portfolio-modal" class="modal"><div id="p-result-area"></div></div>

    <div id="notice-modal" class="modal">
        <div style="background: #000; padding: 30px; border-radius: 35px; border: 1px solid var(--pink-main); text-align: center; max-width: 350px;">
            <i class="fas fa-envelope-open-text" style="font-size: 2.5rem; color: var(--pink-main); margin-bottom: 15px;"></i>
            <p id="notice-body" style="color: #ccc; margin-bottom: 20px;"></p>
            <button class="btn-premium" onclick="document.getElementById('notice-modal').style.display='none'">বুঝেছি</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo", authDomain: "ratanweab.firebaseapp.com", projectId: "ratanweab", storageBucket: "ratanweab.firebasestorage.app", messagingSenderId: "611953936063", appId: "1:611953936063:web:7e3ca24060d7478fb2a80a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const AI_API = "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";

        let currentMsg = null;

        // --- TRAIL LOGIC (Mouse & Phone Combined) ---
        const createTrail = (x, y) => {
            const p = document.createElement('i');
            p.className = 'fas fa-heart trail-particle';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        };

        window.addEventListener('mousemove', (e) => createTrail(e.clientX, e.clientY));
        
        // Touch move trail with passive scroll compatibility
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            createTrail(touch.clientX, touch.clientY);
        }, { passive: true });

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('u-name').innerText = user.displayName;
                document.getElementById('u-photo').src = user.photoURL.replace('s96-c', 's400-c');
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('audio-gate-modal').style.display = 'flex';
                setBDWish(user.displayName);
                startRain();
            }
        });

        window.enterDashboard = () => {
            document.getElementById('audio-gate-modal').style.display = 'none';
            document.getElementById('dashboard-ui').style.display = 'block';
            document.getElementById('snd-open').play().catch(e => console.log("Audio play failed"));
        };

        function setBDWish(name) {
            const hour = new Date().getHours();
            let msg = (hour < 12) ? "শুভ সকাল" : (hour < 17) ? "শুভ দুপুর" : "শুভ সন্ধ্যা";
            document.getElementById('u-wish').innerText = `${msg}, ${name}! কি খবর?`;
        }

        function startRain() {
            const wrap = document.getElementById('header-rain');
            setInterval(() => {
                const h = document.createElement('i');
                h.className = 'fas fa-heart header-heart';
                h.style.left = Math.random() * 100 + '%';
                h.style.fontSize = (Math.random() * 10 + 8) + 'px';
                h.style.animationDuration = (Math.random() * 2 + 2) + 's';
                wrap.appendChild(h);
                setTimeout(() => h.remove(), 4000);
            }, 300);
        }

        window.askAI = async () => {
            const inp = document.getElementById('ai-msg');
            const log = document.getElementById('chat-content');
            if(!inp.value) return;
            const val = inp.value;
            log.innerHTML += `<div style="text-align:right; color:var(--pink-main); margin-bottom:5px;"><b>You:</b> ${val}</div>`;
            inp.value = "চিন্তা করছি...";
            try {
                const r = await fetch("https://api.openai.com/v1/chat/completions", {
                    method:"POST",
                    headers:{"Content-Type":"application/json", "Authorization":`Bearer ${AI_API}`},
                    body: JSON.stringify({model:"gpt-4o-mini", messages:[{role:"user", content:val}]})
                });
                const d = await r.json();
                log.innerHTML += `<div style="margin-bottom:10px;"><b>AI:</b> ${d.choices[0].message.content}</div>`;
            } catch(e){ log.innerHTML += `<div style="color:red;">Error!</div>`; }
            inp.value = "";
            log.scrollTop = log.scrollHeight;
        };

        onSnapshot(doc(db, "system", "updates"), (s) => {
            if(s.exists()){
                currentMsg = s.data();
                if(currentMsg.hasNew) document.getElementById('alert-dot').style.display='block';
            }
        });

        window.openNotice = () => {
            if(currentMsg){
                document.getElementById('notice-body').innerText = currentMsg.message;
                document.getElementById('notice-modal').style.display = 'flex';
                document.getElementById('alert-dot').style.display = 'none';
            }
        };

        window.createPortfolio = () => {
            const name = document.getElementById('p-name').value;
            const title = document.getElementById('p-title').value;
            if(!name || !title) return alert("দয়া করে নাম ও টাইটেল দিন");
            document.getElementById('p-result-area').innerHTML = `
                <div class="result-card">
                    <h3 style="color:var(--pink-main)">${name}</h3>
                    <p>${title}</p>
                    <button class="btn-premium" style="margin-top:15px" onclick="document.getElementById('portfolio-modal').style.display='none'">বন্ধ করুন</button>
                </div>`;
            document.getElementById('p-maker-modal').style.display = 'none';
            document.getElementById('portfolio-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
