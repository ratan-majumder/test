<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Bro | VIP Portal Final V3</title>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pink-main: #ff4d94;
            --pink-glow: rgba(255, 77, 148, 0.6);
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BACKGROUND MESH --- */
        .login-bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(45deg, #020617, #1a0821, #020617);
            background-size: 400% 400%;
            animation: meshMove 12s ease infinite;
        }

        @keyframes meshMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- BIGGER LOVE RAIN --- */
        .header-love-wrap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
            border-radius: 40px;
        }

        .header-heart {
            position: absolute;
            color: var(--pink-main);
            animation: hRain linear forwards;
            opacity: 0;
        }

        @keyframes hRain {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(350px) rotate(360deg); opacity: 0; }
        }

        /* --- LOGIN CARD --- */
        .login-box {
            background: var(--glass);
            padding: 50px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 77, 148, 0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            position: relative;
        }

        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinning-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top: 3px solid var(--pink-main);
            border-bottom: 3px solid var(--pink-main);
            animation: ringRotate 4s linear infinite;
        }

        @keyframes ringRotate { to { transform: rotate(360deg); } }

        .stable-img {
            width: 115px; height: 115px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 5;
            border: 3px solid rgba(255,255,255,0.1);
        }

        .btn-premium {
            background: linear-gradient(90deg, var(--pink-main), #cc0052);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(255, 77, 148, 0.3);
        }

        .btn-premium:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 35px rgba(255, 77, 148, 0.5);
        }

        /* --- DASHBOARD HEADER --- */
        .main-header {
            margin: 20px;
            padding: 65px 20px;
            border-radius: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(255, 77, 148, 0.16), rgba(255, 255, 255, 0.05), rgba(255, 77, 148, 0.10));
            border: 1px solid rgba(255, 120, 180, 0.26);
            backdrop-filter: blur(26px);
            box-shadow: 0 0 35px rgba(255, 77, 148, 0.10), 0 20px 60px rgba(0,0,0,0.35);
        }

        .name-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .side-heart {
            color: var(--pink-main);
            font-size: 20px;
            animation: heartBeat 1.2s infinite ease-in-out;
            filter: drop-shadow(0 0 8px var(--pink-glow));
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .user-name-glow {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--pink-main), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .dashboard-photo-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        .owner-photo {
            width: 118px; height: 118px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--pink-main);
            box-shadow: 0 0 30px rgba(255, 77, 148, 0.45);
        }

        .user-photo {
            width: 98px; height: 98px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            margin-left: -35px;
            z-index: 2;
            box-shadow: 0 10px 25px rgba(0,0,0,0.45);
        }

        /* --- CARDS WITH AUTO-BARI & HOVER ANIMATION --- */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 0 20px 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        .nav-card {
            background: var(--glass);
            border-radius: 35px;
            padding: 35px 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
            animation: autoBari 4s infinite ease-in-out; /* Auto Pink Glow */
        }

        /* Hover Animation: Scale up */
        .nav-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--pink-main);
            box-shadow: 0 15px 30px rgba(255, 77, 148, 0.25);
        }

        /* Shine effect on Hover */
        .nav-card::after {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.6s;
            transform: skewX(-20deg);
        }
        .nav-card:hover::after { left: 150%; }

        /* Auto Bari Animation */
        @keyframes autoBari {
            0%, 100% { border-color: rgba(255,255,255,0.05); box-shadow: none; }
            50% { border-color: var(--pink-main); box-shadow: 0 0 15px rgba(255, 77, 148, 0.2); }
        }

        .nav-card i { font-size: 2.8rem; color: var(--pink-main); margin-bottom: 12px; }
        .wide-card { grid-column: span 2; display: flex; justify-content: center; gap: 15px; }

        /* --- MODAL & CHAT --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .chat-ui { background: rgba(0,0,0,0.6); border-radius: 35px; border: 1px solid rgba(255,77,148,0.2); padding: 25px; }
        #chat-content { height: 140px; overflow-y: auto; margin-bottom: 15px; }
        .chat-input-row { display: flex; gap: 10px; }
        .chat-input-row input { flex: 1; background: #0d1117; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 50px; outline: none; }
    </style>
</head>

<body>
    <div class="login-bg-mesh"></div>

    <audio id="snd-open" src="open.mp3"></audio>
    <audio id="snd-notif" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

    <div id="login-screen" class="modal" style="display: flex;">
        <div class="login-box">
            <div class="avatar-container">
                <div class="spinning-ring"></div>
                <img src="ratan.jpg" class="stable-img">
            </div>
            <h2>RATAN BRO</h2>
            <p style="color: #666; font-size: 13px; margin-bottom: 30px;">SECURE DASHBOARD ACCESS</p>
            <button class="btn-premium" onclick="login()">LOGIN WITH GOOGLE</button>
        </div>
    </div>

    <div id="dashboard-ui" style="display: none;">
        <div style="display: flex; justify-content: flex-end; padding: 15px 25px; gap: 12px;">
            <div style="background: rgba(255, 77, 148, 0.1); border: 1px solid var(--pink-main); color: var(--pink-main); padding: 5px 15px; border-radius: 50px; font-size: 13px; font-weight: 700;">
                <i class="fas fa-eye"></i> <span id="v-count">200</span>
            </div>
            <button onclick="logout()" style="background: none; border: 1px solid #333; color: #555; padding: 6px 15px; border-radius: 50px; cursor: pointer;">Sign Out</button>
        </div>

        <header class="main-header">
            <div id="header-rain" class="header-love-wrap"></div>
            <div class="dashboard-photo-wrap">
                <img src="ratan.jpg" class="owner-photo">
                <img id="u-photo" src="" class="user-photo">
            </div>
            <div class="name-container">
                <i class="fas fa-heart side-heart"></i>
                <span id="u-name" class="user-name-glow">...</span>
                <i class="fas fa-heart side-heart"></i>
            </div>
        </header>

        <main class="grid-layout">
            <div class="nav-card" onclick="openNotice()">
                <div id="alert-dot" style="position:absolute; top:15px; right:15px; width:12px; height:12px; background:red; border-radius:50%; display:none;"></div>
                <i class="fas fa-bell"></i><p>Notification</p>
            </div>
            <a href="testpaper.html" class="nav-card"><i class="fas fa-file-pdf"></i><p>Test Papers</p></a>
            <a href="business.html" class="nav-card"><i class="fas fa-briefcase"></i><p>Business</p></a>
            <a href="portfolio.html" class="nav-card"><i class="fas fa-user-circle"></i><p>Portfolio</p></a>
            <a href="https://numberlookup.pro.bd/" target="_blank" class="nav-card wide-card"><i class="fas fa-shield-virus"></i><p>Advanced Identity Lookup</p></a>
        </main>

        <section style="max-width:500px; margin:0 auto 50px; padding:0 20px;">
            <div class="chat-ui">
                <div id="chat-content"><b>AI Assistant:</b> পোর্টালে স্বাগতম।</div>
                <div class="chat-input-row">
                    <input type="text" id="ai-msg" placeholder="Type here...">
                    <button onclick="askAI()" class="btn-premium" style="width: auto; padding: 10px 20px;">SEND</button>
                </div>
            </div>
        </section>
    </div>

    <div id="notice-modal" class="modal">
        <div class="login-box">
            <i class="fas fa-envelope-open" style="font-size: 3rem; color: var(--pink-main);"></i>
            <p id="notice-body" style="margin: 20px 0; color: #ccc;"></p>
            <button class="btn-premium" onclick="closeNotice()">GOT IT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const AI_API = "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";

        let currentMsg = null;

        function startHeaderRain() {
            const hWrap = document.getElementById('header-rain');
            setInterval(() => {
                const heart = document.createElement('i');
                heart.className = 'fas fa-heart header-heart';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                hWrap.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 500);
        }

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('u-name').innerText = user.displayName;
                document.getElementById('u-photo').src = user.photoURL;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-ui').style.display = 'block';
                startHeaderRain();
                try { document.getElementById('snd-open').play(); } catch(e){}
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('dashboard-ui').style.display = 'none';
            }
        });

        window.askAI = async () => {
            const inp = document.getElementById('ai-msg');
            const log = document.getElementById('chat-content');
            if (!inp.value) return;
            const msg = inp.value;
            log.innerHTML += `<div style="text-align:right; color:var(--pink-main); margin-top:8px;"><b>You:</b> ${msg}</div>`;
            inp.value = "Thinking...";
            try {
                const res = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${AI_API}` },
                    body: JSON.stringify({ model: "gpt-4o-mini", messages: [{ role: "user", content: msg }] })
                });
                const data = await res.json();
                log.innerHTML += `<div style="margin-top:5px;"><b>AI:</b> ${data.choices[0].message.content}</div>`;
            } catch (e) { log.innerHTML += `<div style="color:red;">API Error!</div>`; }
            inp.value = "";
            log.scrollTop = log.scrollHeight;
        };

        onSnapshot(doc(db, "system", "updates"), (snap) => {
            if (snap.exists()) {
                currentMsg = snap.data();
                if (currentMsg.hasNew) {
                    document.getElementById('alert-dot').style.display = 'block';
                    try { document.getElementById('snd-notif').play(); } catch(e){}
                }
            }
        });

        window.openNotice = () => {
            if (currentMsg) {
                document.getElementById('notice-body').innerText = currentMsg.message;
                document.getElementById('notice-modal').style.display = 'flex';
                document.getElementById('alert-dot').style.display = 'none';
            }
        };

        window.closeNotice = () => { document.getElementById('notice-modal').style.display = 'none'; };
    </script>
</body>
</html>
